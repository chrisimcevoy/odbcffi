name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "pypy-3.10"
          - "pypy-3.11"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install ODBC drivers (Linux)
        if: runner.os == 'Linux'
        run: |
          # base deps
          sudo apt install -y unixodbc freetds-bin freetds-dev tdsodbc odbc-postgresql

          # msodbc
          curl -sSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 msodbcsql18

          # mysql connector
          curl -L -o mysql-connector-odbc.deb https://dev.mysql.com/get/Downloads/Connector-ODBC/9.7/mysql-connector-odbc_9.7.0-1debian12_amd64.deb
          sudo dpkg -i mysql-connector-odbc.deb
          rm mysql-connector-odbc.deb
          
          odbcinst -j
        
          cat /etc/odbcinst.ini

      - name: Install ODBC drivers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install --verbose psqlodbc
          choco install --verbose mysql.odbc

      - name: Set up Docker in WSL2 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $distros = wsl --list --quiet 2>$null
          if (-not ($distros -match 'Ubuntu')) {
            Write-Output "Installing Ubuntu WSL2 distro..."
            wsl --install -d Ubuntu 2>&1 | Out-String | Write-Output
          }

          wsl -d Ubuntu bash -c '
            set -e
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker in WSL2..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker $USER
            fi
            echo "Starting Docker daemon..."
            sudo service docker start
            echo "Docker ready:"
            docker info --format "{{.OSType}} {{.ServerVersion}}"
          '

      - name: Build docker-compose stack (Windows via WSL2)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $wslPath = $env:GITHUB_WORKSPACE -replace '\\', '/' -replace '^([A-Z]):', '/mnt/$1'
          $wslPath = $wslPath.ToLower()

          wsl -d Ubuntu bash -c "
            set -e
            cd $wslPath
            sudo docker compose up -d --wait sqlserver postgresql mysql
          "

      - name: Build the docker-compose stack (Linux)
        if: runner.os == 'Linux'
        run: docker compose up -d --wait sqlserver postgresql mysql

      - name: Set up Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest -v --color=yes

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    environment: pypi
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python

      - name: Set up Python
        if: steps.release.outputs.release_created
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false

      - name: Build
        if: steps.release.outputs.release_created
        run: uv build

      - name: Publish
        if: steps.release.outputs.release_created
        run: uv publish
